<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">System Solution Versus Objectives</title>
  <desc id="desc">Report graphic comparing ZimRecruit objectives with implemented system solution features and testing evidence.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="bgTop" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font-family: Arial, sans-serif; font-weight: 800; font-size: 52px; }
      .subtitle { fill: #475569; font-family: Arial, sans-serif; font-size: 25px; }
      .panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 2; filter: url(#shadow); }
      .header { fill: #0e8a3e; }
      .header2 { fill: #0f172a; }
      .headText { fill: #ffffff; font-family: Arial, sans-serif; font-size: 23px; font-weight: 800; }
      .cellText { fill: #334155; font-family: Arial, sans-serif; font-size: 22px; }
      .objective { fill: #0f172a; font-family: Arial, sans-serif; font-size: 23px; font-weight: 800; }
      .evidence { fill: #047857; font-family: Arial, sans-serif; font-size: 20px; font-weight: 800; }
      .muted { fill: #64748b; font-family: Arial, sans-serif; font-size: 20px; }
      .rowLine { stroke: #e2e8f0; stroke-width: 2; }
      .colLine { stroke: #dbe3ee; stroke-width: 2; }
      .tickCircle { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
      .tick { fill: none; stroke: #047857; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .badge { fill: #fef9c3; stroke: #fde68a; stroke-width: 2; }
      .badgeText { fill: #854d0e; font-family: Arial, sans-serif; font-size: 18px; font-weight: 800; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="1000"/>
  <rect width="1600" height="220" fill="url(#bgTop)"/>
  <circle cx="1428" cy="75" r="70" fill="#0e8a3e" opacity="0.10"/>
  <circle cx="1498" cy="155" r="92" fill="#3b82f6" opacity="0.08"/>
  <text x="80" y="88" class="title">System Solution vs Objectives</text>
  <text x="80" y="132" class="subtitle">The implemented system features were tested against the project objectives and security design.</text>
  <rect x="80" y="160" width="315" height="34" rx="17" class="badge"/>
  <text x="104" y="183" class="badgeText">SECTION 3 TESTING SUMMARY</text>

  <g transform="translate(80 275)">
    <rect width="1440" height="625" rx="24" class="panel"/>
    <rect x="0" y="0" width="1440" height="78" rx="24" class="header"/>
    <path d="M0 54h1440v24H0z" class="header"/>
    <text x="42" y="49" class="headText">Objective</text>
    <text x="395" y="49" class="headText">System Solution</text>
    <text x="905" y="49" class="headText">Testing Evidence</text>
    <text x="1262" y="49" class="headText">Result</text>

    <path d="M350 0v625" class="colLine"/>
    <path d="M860 0v625" class="colLine"/>
    <path d="M1235 0v625" class="colLine"/>
    <path d="M0 188h1440" class="rowLine"/>
    <path d="M0 298h1440" class="rowLine"/>
    <path d="M0 408h1440" class="rowLine"/>
    <path d="M0 518h1440" class="rowLine"/>

    <text x="42" y="126" class="objective">Reduce forged</text>
    <text x="42" y="156" class="objective">credentials</text>
    <text x="395" y="116" class="cellText">Document hashes and verifier attestations</text>
    <text x="395" y="148" class="cellText">are stored on the local chain for proof.</text>
    <text x="905" y="116" class="evidence">TC-03, TC-04, TC-06</text>
    <text x="905" y="148" class="muted">Upload, approval, public verification</text>
    <circle cx="1327" cy="132" r="25" class="tickCircle"/>
    <path d="M1315 132l9 10 18-21" class="tick"/>

    <text x="42" y="236" class="objective">Enforce secure</text>
    <text x="42" y="266" class="objective">access control</text>
    <text x="395" y="226" class="cellText">JWT-protected API routes, Appwrite auth,</text>
    <text x="395" y="258" class="cellText">middleware redirects, and role checks.</text>
    <text x="905" y="226" class="evidence">ST-01, ST-02, ST-04</text>
    <text x="905" y="258" class="muted">Unauthorized access rejected</text>
    <circle cx="1327" cy="242" r="25" class="tickCircle"/>
    <path d="M1315 242l9 10 18-21" class="tick"/>

    <text x="42" y="346" class="objective">Support trusted</text>
    <text x="42" y="376" class="objective">recruitment</text>
    <text x="395" y="336" class="cellText">Employers post jobs and view applicants</text>
    <text x="395" y="368" class="cellText">with verified credential indicators.</text>
    <text x="905" y="336" class="evidence">TC-05</text>
    <text x="905" y="368" class="muted">Verified pipeline confirms trust signals</text>
    <circle cx="1327" cy="352" r="25" class="tickCircle"/>
    <path d="M1315 352l9 10 18-21" class="tick"/>

    <text x="42" y="456" class="objective">Maintain auditability</text>
    <text x="42" y="486" class="objective">and transparency</text>
    <text x="395" y="446" class="cellText">Admin audit log, verification decisions,</text>
    <text x="395" y="478" class="cellText">and on-chain records are traceable.</text>
    <text x="905" y="446" class="evidence">ST-05, ST-06</text>
    <text x="905" y="478" class="muted">Contract RBAC and audit trail verified</text>
    <circle cx="1327" cy="462" r="25" class="tickCircle"/>
    <path d="M1315 462l9 10 18-21" class="tick"/>

    <text x="42" y="566" class="objective">Provide usable</text>
    <text x="42" y="596" class="objective">role workflows</text>
    <text x="395" y="556" class="cellText">Applicant, employer, verifier, admin, and</text>
    <text x="395" y="588" class="cellText">public pages compile and render correctly.</text>
    <text x="905" y="556" class="evidence">Production build: 23 routes</text>
    <text x="905" y="588" class="muted">Next.js build and typecheck passed</text>
    <circle cx="1327" cy="572" r="25" class="tickCircle"/>
    <path d="M1315 572l9 10 18-21" class="tick"/>
  </g>
</svg>
