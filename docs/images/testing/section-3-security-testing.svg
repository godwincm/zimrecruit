<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Section 3 Testing - Security Testing</title>
  <desc id="desc">Report graphic showing security test cases for JWT enforcement, role-based access control, file upload validation, audit logs, and smart contract access control.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="head" x1="0" x2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#065f46"/>
    </linearGradient>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #ffffff; font-family: Arial, sans-serif; font-weight: 800; font-size: 52px; }
      .subtitle { fill: #dbeafe; font-family: Arial, sans-serif; font-size: 25px; }
      .panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 2; filter: url(#shadow); }
      .terminal { fill: #0f172a; }
      .screen { fill: #f8fafc; stroke: #dbe3ee; stroke-width: 1.5; }
      .h2 { fill: #0f172a; font-family: Arial, sans-serif; font-size: 28px; font-weight: 800; }
      .copy { fill: #475569; font-family: Arial, sans-serif; font-size: 22px; }
      .small { fill: #64748b; font-family: Arial, sans-serif; font-size: 18px; }
      .code { fill: #d1fae5; font-family: Consolas, monospace; font-size: 20px; }
      .codeRed { fill: #fecaca; font-family: Consolas, monospace; font-size: 20px; }
      .pass { fill: #047857; font-family: Arial, sans-serif; font-weight: 800; font-size: 18px; }
      .fail { fill: #b91c1c; font-family: Arial, sans-serif; font-weight: 800; font-size: 18px; }
      .pillGreen { fill: #dcfce7; stroke: #86efac; }
      .pillRed { fill: #fee2e2; stroke: #fecaca; }
      .pillBlue { fill: #dbeafe; stroke: #93c5fd; }
      .line { stroke: #cbd5e1; stroke-width: 2; }
      .shield { fill: #0e8a3e; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="1000"/>
  <rect width="1600" height="220" fill="url(#head)"/>
  <path d="M1282 46l88 33v70c0 67-39 118-88 139-49-21-88-72-88-139V79z" fill="#ffffff" opacity="0.08"/>
  <path d="M1378 78l56 21v44c0 43-25 75-56 88-31-13-56-45-56-88V99z" fill="#d4af37" opacity="0.16"/>
  <text x="80" y="86" class="title">Security Testing Evidence</text>
  <text x="80" y="132" class="subtitle">Security controls were tested against invalid access, unsafe uploads, and unauthorized attestation attempts.</text>
  <rect x="80" y="160" width="366" height="34" rx="17" class="pillGreen"/>
  <text x="105" y="183" class="pass">SECURITY DESIGN ENFORCED</text>

  <g transform="translate(80 270)">
    <rect width="460" height="280" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">ST-01 Protected API Route</text>
    <rect x="28" y="74" width="404" height="142" rx="14" class="terminal"/>
    <text x="48" y="112" class="code">GET /api/documents</text>
    <text x="48" y="148" class="codeRed">Authorization: missing</text>
    <text x="48" y="184" class="codeRed">Response: 401 Unauthorized</text>
    <rect x="28" y="232" width="180" height="30" rx="15" class="pillGreen"/>
    <text x="51" y="253" class="pass">JWT required</text>
    <text x="228" y="253" class="small">Unauthenticated users blocked.</text>
  </g>

  <g transform="translate(570 270)">
    <rect width="460" height="280" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">ST-02 Role-Based Access</text>
    <rect x="28" y="74" width="404" height="142" rx="14" class="screen"/>
    <rect x="50" y="100" width="153" height="42" rx="12" class="pillBlue"/>
    <text x="74" y="127" fill="#1d4ed8" font-family="Arial" font-weight="800" font-size="19">Applicant</text>
    <path d="M222 122h72" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <path d="M294 122l-14-11v22z" fill="#94a3b8"/>
    <rect x="314" y="100" width="85" height="42" rx="12" class="pillRed"/>
    <text x="334" y="127" class="fail">403</text>
    <text x="50" y="180" class="copy">/admin and /verifier routes denied</text>
    <rect x="28" y="232" width="180" height="30" rx="15" class="pillGreen"/>
    <text x="49" y="253" class="pass">RBAC active</text>
    <text x="228" y="253" class="small">Wrong roles cannot enter.</text>
  </g>

  <g transform="translate(1060 270)">
    <rect width="460" height="280" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">ST-03 Upload Validation</text>
    <rect x="28" y="74" width="404" height="142" rx="14" class="screen"/>
    <rect x="52" y="100" width="356" height="46" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="72" y="130" class="copy">malware.exe</text>
    <rect x="260" y="110" width="112" height="26" rx="13" class="pillRed"/>
    <text x="283" y="129" class="fail">Blocked</text>
    <text x="52" y="180" class="small">Allowed: PDF, PNG, JPEG within size limit</text>
    <rect x="28" y="232" width="206" height="30" rx="15" class="pillGreen"/>
    <text x="50" y="253" class="pass">MIME enforced</text>
    <text x="252" y="253" class="small">Unsafe files rejected.</text>
  </g>

  <g transform="translate(80 600)">
    <rect width="460" height="280" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">ST-04 Session Logout</text>
    <rect x="28" y="74" width="404" height="142" rx="14" class="terminal"/>
    <text x="48" y="112" class="code">POST /api/auth/logout</text>
    <text x="48" y="148" class="code">Token added to deny-list</text>
    <text x="48" y="184" class="codeRed">Re-use token: 401 Unauthorized</text>
    <rect x="28" y="232" width="190" height="30" rx="15" class="pillGreen"/>
    <text x="51" y="253" class="pass">Replay blocked</text>
    <text x="238" y="253" class="small">Redis deny-list enforced.</text>
  </g>

  <g transform="translate(570 600)">
    <rect width="460" height="280" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">ST-05 Contract Access</text>
    <rect x="28" y="74" width="404" height="142" rx="14" class="terminal"/>
    <text x="48" y="112" class="code">attestDocument(hash)</text>
    <text x="48" y="148" class="codeRed">Caller: non-verifier wallet</text>
    <text x="48" y="184" class="codeRed">Revert: AccessControl</text>
    <rect x="28" y="232" width="222" height="30" rx="15" class="pillGreen"/>
    <text x="52" y="253" class="pass">On-chain RBAC</text>
    <text x="268" y="253" class="small">Only verifiers attest.</text>
  </g>

  <g transform="translate(1060 600)">
    <rect width="460" height="280" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">ST-06 Audit Trail</text>
    <rect x="28" y="74" width="404" height="142" rx="14" class="screen"/>
    <text x="52" y="112" class="small">Timestamp</text>
    <text x="178" y="112" class="small">Actor</text>
    <text x="285" y="112" class="small">Action</text>
    <path d="M50 128h356" class="line"/>
    <text x="52" y="162" class="small">2026-05-15</text>
    <text x="178" y="162" class="small">Verifier</text>
    <text x="285" y="162" class="small">Approved</text>
    <text x="52" y="198" class="small">2026-05-15</text>
    <text x="178" y="198" class="small">Admin</text>
    <text x="285" y="198" class="small">Onboarded</text>
    <rect x="28" y="232" width="214" height="30" rx="15" class="pillGreen"/>
    <text x="51" y="253" class="pass">Traceability</text>
    <text x="262" y="253" class="small">Security events visible.</text>
  </g>
</svg>
