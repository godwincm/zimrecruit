version: "3.9"

services:
  # ── MySQL 8.0 ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: zimrecruit_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-zimrecruit}
      MYSQL_USER:          ${MYSQL_USER:-zimrecruit}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-zimrecruitsecret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 (BullMQ + session store) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zimrecruit_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Express API ───────────────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
    container_name: zimrecruit_api
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV:               production
      PORT:                   4000
      MYSQL_HOST:             mysql
      MYSQL_PORT:             3306
      MYSQL_DATABASE:         ${MYSQL_DATABASE:-zimrecruit}
      MYSQL_USER:             ${MYSQL_USER:-zimrecruit}
      MYSQL_PASSWORD:         ${MYSQL_PASSWORD:-zimrecruitsecret}
      REDIS_URL:              redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      APPWRITE_ENDPOINT:      ${APPWRITE_ENDPOINT}
      APPWRITE_PROJECT_ID:    ${APPWRITE_PROJECT_ID}
      APPWRITE_API_KEY:       ${APPWRITE_API_KEY}
      APPWRITE_BUCKET_MEDIA:  ${APPWRITE_BUCKET_MEDIA:-zimrecruit-media}
      JWT_PRIVATE_KEY_PEM:    ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM:     ${JWT_PUBLIC_KEY_PEM}
      JWT_ACCESS_TTL:         15m
      JWT_REFRESH_TTL:        7d
      BLOCKCHAIN_RPC_URL:     ${BLOCKCHAIN_RPC_URL}
      BLOCKCHAIN_CHAIN_ID:    ${BLOCKCHAIN_CHAIN_ID:-31337}
      CONTRACT_ADDRESS:       ${CONTRACT_ADDRESS}
      VERIFIER_PRIVATE_KEY:   ${VERIFIER_PRIVATE_KEY}
      VERIFIER_WALLET_ADDRESS: ${VERIFIER_WALLET_ADDRESS}
      GAS_LIMIT:              ${GAS_LIMIT:-250000}
      APP_BASE_URL:           ${APP_BASE_URL:-https://zimrecruit.co.zw}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ──────────────────────────────────────────
  web:
    build:
      context: ../../apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
    container_name: zimrecruit_web
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
    environment:
      NEXT_PUBLIC_API_URL:          http://api:4000
      NEXT_PUBLIC_APPWRITE_ENDPOINT: ${APPWRITE_ENDPOINT}
      NEXT_PUBLIC_APPWRITE_PROJECT:  ${APPWRITE_PROJECT_ID}
      NEXT_PUBLIC_APPWRITE_BUCKET_MEDIA: ${APPWRITE_BUCKET_MEDIA:-zimrecruit-media}
    ports:
      - "3000:3000"

  # ── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: zimrecruit_nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  mysql_data:
  redis_data:
