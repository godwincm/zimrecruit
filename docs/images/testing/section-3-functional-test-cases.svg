<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Section 3 Testing - Functional Test Cases</title>
  <desc id="desc">Report graphic showing functional test case screenshots for login, registration, document upload, verifier approval, employer pipeline, and public verification.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#fefce8"/>
    </linearGradient>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 2; filter: url(#shadow); }
      .screen { fill: #f8fafc; stroke: #dbe3ee; stroke-width: 1.5; }
      .bar { fill: #0e8a3e; }
      .gold { fill: #d4af37; }
      .muted { fill: #64748b; font-family: Arial, sans-serif; font-size: 24px; }
      .small { fill: #64748b; font-family: Arial, sans-serif; font-size: 20px; }
      .tiny { fill: #64748b; font-family: Arial, sans-serif; font-size: 18px; }
      .title { fill: #0f172a; font-family: Arial, sans-serif; font-weight: 800; font-size: 54px; }
      .subtitle { fill: #475569; font-family: Arial, sans-serif; font-size: 25px; }
      .h2 { fill: #0f172a; font-family: Arial, sans-serif; font-weight: 800; font-size: 28px; }
      .label { fill: #0f172a; font-family: Arial, sans-serif; font-weight: 700; font-size: 21px; }
      .pass { fill: #047857; font-family: Arial, sans-serif; font-weight: 800; font-size: 18px; }
      .pill { fill: #dcfce7; stroke: #86efac; stroke-width: 1; }
      .line { stroke: #cbd5e1; stroke-width: 2; }
      .input { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; }
      .button { fill: #0e8a3e; }
      .buttonText { fill: #ffffff; font-family: Arial, sans-serif; font-weight: 700; font-size: 18px; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <rect x="0" y="0" width="1600" height="210" fill="url(#hero)"/>
  <circle cx="1430" cy="68" r="55" fill="#0e8a3e" opacity="0.10"/>
  <circle cx="1490" cy="145" r="78" fill="#d4af37" opacity="0.14"/>
  <text x="80" y="90" class="title">3. Testing</text>
  <text x="80" y="132" class="subtitle">Functional test case screenshots demonstrate that key ZimRecruit workflows behave as expected.</text>
  <rect x="80" y="158" width="270" height="34" rx="17" class="pill"/>
  <text x="103" y="181" class="pass">BUILD STATUS: ALL ROUTES PASS</text>

  <g transform="translate(80 250)">
    <rect width="455" height="305" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">TC-01 Authentication</text>
    <rect x="28" y="72" width="399" height="190" rx="14" class="screen"/>
    <rect x="28" y="72" width="399" height="38" rx="14" class="bar"/>
    <circle cx="54" cy="91" r="6" fill="#fecaca"/>
    <circle cx="75" cy="91" r="6" fill="#fde68a"/>
    <circle cx="96" cy="91" r="6" fill="#bbf7d0"/>
    <text x="46" y="145" class="label">Login</text>
    <rect x="46" y="162" width="320" height="28" rx="8" class="input"/>
    <text x="58" y="183" class="tiny">you@example.com</text>
    <rect x="46" y="202" width="320" height="28" rx="8" class="input"/>
    <text x="58" y="223" class="tiny">Enter your password</text>
    <circle cx="344" cy="216" r="10" fill="none" stroke="#64748b" stroke-width="2"/>
    <rect x="46" y="241" width="122" height="32" rx="10" class="button"/>
    <text x="72" y="263" class="buttonText">Log in</text>
    <text x="28" y="288" class="pass">PASS: valid user redirected by role</text>
  </g>

  <g transform="translate(573 250)">
    <rect width="455" height="305" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">TC-02 Registration</text>
    <rect x="28" y="72" width="399" height="190" rx="14" class="screen"/>
    <rect x="28" y="72" width="399" height="38" rx="14" class="bar"/>
    <text x="47" y="142" class="label">Create your account</text>
    <rect x="47" y="160" width="147" height="44" rx="12" fill="#dcfce7" stroke="#0e8a3e"/>
    <text x="76" y="188" class="small">Applicant</text>
    <rect x="214" y="160" width="147" height="44" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="250" y="188" class="small">Employer</text>
    <rect x="47" y="220" width="310" height="28" rx="8" class="input"/>
    <text x="59" y="241" class="tiny">Create a password</text>
    <circle cx="335" cy="234" r="10" fill="none" stroke="#64748b" stroke-width="2"/>
    <text x="28" y="288" class="pass">PASS: required fields and role stored</text>
  </g>

  <g transform="translate(1066 250)">
    <rect width="455" height="305" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">TC-03 Document Upload</text>
    <rect x="28" y="72" width="399" height="190" rx="14" class="screen"/>
    <rect x="28" y="72" width="399" height="38" rx="14" class="bar"/>
    <text x="50" y="145" class="label">Applicant Documents</text>
    <rect x="50" y="164" width="306" height="68" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <path d="M70 181h42v36H70z" fill="#dcfce7" stroke="#0e8a3e"/>
    <text x="128" y="191" class="tiny">Degree Certificate.pdf</text>
    <text x="128" y="218" class="tiny">SHA-256 hash generated</text>
    <rect x="258" y="238" width="98" height="30" rx="10" class="button"/>
    <text x="278" y="259" class="buttonText">Submit</text>
    <text x="28" y="288" class="pass">PASS: file recorded and queued</text>
  </g>

  <g transform="translate(80 605)">
    <rect width="455" height="305" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">TC-04 Verifier Approval</text>
    <rect x="28" y="72" width="399" height="190" rx="14" class="screen"/>
    <rect x="28" y="72" width="399" height="38" rx="14" class="bar"/>
    <text x="48" y="143" class="label">Verification Queue</text>
    <rect x="48" y="164" width="330" height="50" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="66" y="195" class="tiny">T. Dhliwayo - Education</text>
    <rect x="210" y="226" width="78" height="31" rx="10" fill="#fee2e2"/>
    <text x="226" y="248" fill="#b91c1c" font-family="Arial" font-weight="700" font-size="17">Reject</text>
    <rect x="300" y="226" width="78" height="31" rx="10" class="button"/>
    <text x="316" y="248" class="buttonText">Approve</text>
    <text x="28" y="288" class="pass">PASS: approval creates attestation</text>
  </g>

  <g transform="translate(573 605)">
    <rect width="455" height="305" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">TC-05 Employer Pipeline</text>
    <rect x="28" y="72" width="399" height="190" rx="14" class="screen"/>
    <rect x="28" y="72" width="399" height="38" rx="14" class="bar"/>
    <text x="48" y="143" class="label">Verified Applicants</text>
    <rect x="48" y="163" width="330" height="46" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="66" y="192" class="tiny">Tinashe Dhliwayo</text>
    <rect x="270" y="174" width="86" height="24" rx="12" fill="#dcfce7"/>
    <text x="285" y="192" fill="#047857" font-family="Arial" font-size="16" font-weight="700">Verified</text>
    <path d="M72 232h260" class="line"/>
    <circle cx="72" cy="232" r="8" class="gold"/>
    <circle cx="158" cy="232" r="8" class="gold"/>
    <circle cx="244" cy="232" r="8" fill="#cbd5e1"/>
    <circle cx="330" cy="232" r="8" fill="#cbd5e1"/>
    <text x="28" y="288" class="pass">PASS: only verified docs highlighted</text>
  </g>

  <g transform="translate(1066 605)">
    <rect width="455" height="305" rx="22" class="panel"/>
    <text x="28" y="48" class="h2">TC-06 Public Verification</text>
    <rect x="28" y="72" width="399" height="190" rx="14" class="screen"/>
    <rect x="28" y="72" width="399" height="38" rx="14" class="bar"/>
    <text x="48" y="144" class="label">Verify Credential</text>
    <rect x="48" y="164" width="290" height="34" rx="9" class="input"/>
    <text x="60" y="187" class="tiny">0x9f... document hash</text>
    <rect x="48" y="213" width="150" height="34" rx="10" class="button"/>
    <text x="68" y="236" class="buttonText">Check proof</text>
    <rect x="216" y="213" width="122" height="34" rx="17" fill="#dcfce7"/>
    <text x="235" y="236" fill="#047857" font-family="Arial" font-weight="800" font-size="18">On-chain</text>
    <text x="28" y="288" class="pass">PASS: public proof resolves</text>
  </g>
</svg>
